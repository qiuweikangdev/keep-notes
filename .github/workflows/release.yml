name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-release:
    name: Semantic Release
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release-result.outputs.should_release }}
      tag_name: ${{ steps.release-result.outputs.tag_name }}
      version: ${{ steps.release-result.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --registry=https://registry.npmjs.org/

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build renderer and main process
        run: pnpm build

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm semantic-release

      - name: Resolve semantic-release result
        id: release-result
        shell: bash
        run: |
          if [ ! -f .semantic-release-result.json ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$(node -p "require('./.semantic-release-result.json').version")"
          TAG_NAME="$(node -p "require('./.semantic-release-result.json').gitTag")"

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

  build-and-publish:
    name: Build ${{ matrix.name }}
    needs: semantic-release
    if: needs.semantic-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            build_args: --mac
          - name: Windows
            os: windows-latest
            build_args: --win
          - name: Linux
            os: ubuntu-latest
            build_args: --linux AppImage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --registry=https://registry.npmjs.org/

      - name: Typecheck and build app
        run: pnpm build

      - name: Install Electron app dependencies
        run: pnpm exec electron-builder install-app-deps

      - name: Package and publish installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm exec electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload installers to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.tag_name }}
          files: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.blockmap
            dist/**/*.zsync

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keep-notes-${{ needs.semantic-release.outputs.version }}-${{ matrix.name }}
          path: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.blockmap
            dist/**/*.zsync
          if-no-files-found: ignore
