name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          TAG_SHA="$(git rev-list -n 1 "${TAG_NAME}" 2>/dev/null || true)"
          if [ -z "${TAG_SHA}" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "${TAG_SHA}" = "$GITHUB_SHA" ]; then
            echo "::notice::${TAG_NAME} already points to this commit. Reusing the existing tag for release assets."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::${TAG_NAME} already points to another commit. Bump package.json version before publishing a new update."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Ensure release tag
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "${{ steps.version.outputs.tag_name }} already exists."
          else
            git tag "${{ steps.version.outputs.tag_name }}" "$GITHUB_SHA"
            git push origin "${{ steps.version.outputs.tag_name }}"
          fi

      - name: Ensure GitHub release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag_name }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.version.outputs.tag_name }}" \
              --title "Keep Notes ${{ steps.version.outputs.tag_name }}" \
              --notes "Automated release for Keep Notes ${{ steps.version.outputs.version }}."
          else
            gh release create "${{ steps.version.outputs.tag_name }}" \
              --title "Keep Notes ${{ steps.version.outputs.tag_name }}" \
              --notes "Automated release for Keep Notes ${{ steps.version.outputs.version }}."
          fi

  build-and-publish:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            build_args: --mac
          - name: Windows
            os: windows-latest
            build_args: --win
          - name: Linux
            os: ubuntu-latest
            build_args: --linux AppImage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck and build app
        run: pnpm build

      - name: Install Electron app dependencies
        run: pnpm exec electron-builder install-app-deps

      - name: Package and publish installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm exec electron-builder ${{ matrix.build_args }} --publish never

      - name: Upload installers to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          files: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.blockmap
            dist/**/*.zsync

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keep-notes-${{ needs.prepare-release.outputs.version }}-${{ matrix.name }}
          path: |
            dist/**/*.dmg
            dist/**/*.zip
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.blockmap
            dist/**/*.zsync
          if-no-files-found: ignore
